name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  auto_tag:
    name: Auto Tag Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.ref_type != 'tag'
    concurrency:
      group: auto-tag-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Create and push new version tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            NEW="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$NEW"
          git push origin "$NEW"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ruffle_desktop
            asset_name: ruffle-linux-x86_64
          - os: windows-latest
            artifact_name: ruffle_desktop.exe
            asset_name: ruffle-windows-x86_64.exe
          - os: macos-latest
            artifact_name: ruffle_desktop
            asset_name: ruffle-macos-x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libdbus-1-dev \
            libfontconfig1-dev \
            pkg-config

      - name: Set up Java (required by core/build_playerglobal)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of 2026-03-27
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --locked -p ruffle_desktop

      - name: Rename binary for upload
        shell: bash
        run: |
          cp target/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Make binary executable
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.asset_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only run on version tags (e.g. v1.2.3)
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Ruffle Desktop

            Pre-built binaries for this release are attached below.

            ### Usage

            **Linux**
            ```bash
            chmod +x ruffle-linux-x86_64
            ./ruffle-linux-x86_64 path/to/movie.swf
            ```

            **macOS**
            ```bash
            chmod +x ruffle-macos-x86_64
            ./ruffle-macos-x86_64 path/to/movie.swf
            ```

            **Windows**
            ```
            ruffle-windows-x86_64.exe path\to\movie.swf
            ```

            Run with `--help` for a full list of options.
          files: |
            artifacts/**/*
