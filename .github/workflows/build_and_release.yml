name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'copilot/fix-mismatched-types-errors'

  # Allow for manual dispatch on GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ruffle_gpu-linux-x86_64.tar.gz
            build_cmd: |
              sudo apt-get update
              sudo apt-get install -y pkg-config libasound2-dev libudev-dev
              cargo build --release --verbose
              tar -czf ruffle_gpu-linux-x86_64.tar.gz -C target/release ruffle_desktop 2>/dev/null || \
              tar -czf ruffle_gpu-linux-x86_64.tar.gz -C target/release $(ls target/release | grep -E '^ruffle' | head -1)

          - os: windows-latest
            artifact_name: ruffle_gpu-windows-x86_64.zip
            build_cmd: |
              cargo build --release --verbose
              $binary = Get-ChildItem target/release -Filter "ruffle*.exe" | Select-Object -First 1
              Compress-Archive -Path "target/release/$($binary.Name)" -DestinationPath "ruffle_gpu-windows-x86_64.zip"

          - os: macos-latest
            artifact_name: ruffle_gpu-macos-x86_64.tar.gz
            build_cmd: |
              cargo build --release --verbose
              tar -czf ruffle_gpu-macos-x86_64.tar.gz -C target/release ruffle_desktop 2>/dev/null || \
              tar -czf ruffle_gpu-macos-x86_64.tar.gz -C target/release $(ls target/release | grep '^ruffle' | head -1)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: ${{ matrix.build_cmd }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            artifacts/**/* || true
